# Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Security Configuration
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/auth/jwks

# Disable actuator security for tests
management.security.enabled=false

# AI Service Configuration
ai.service.url=http://localhost:3000
ai.service.internal.api.key=test-key

# Email Configuration
resend.api.key=test-key

# Test-specific properties
spring.test.database.replace=none
logging.level.com.neeshai=DEBUG
logging.level.org.springframework.security=DEBUG