spring.application.name=neesh-ai-backend
server.port=8081

# Database Configuration (Supabase)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.svtpjdaxikucgpflbeln}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Connection Pooling for High Load
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=15
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# Query Performance Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Supabase Auth Configuration
# REQUIRED: Set SUPABASE_JWT_SECRET env var
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_URL:https://svtpjdaxikucgpflbeln.supabase.co}/auth/v1/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-post-size=52428800
server.tomcat.max-swallow-size=52428800

# Tomcat Thread Pool for 100+ Concurrent Users
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
server.tomcat.max-connections=2000
server.tomcat.accept-count=200
server.tomcat.connection-timeout=20000

# Production Logging - Debug SQL logging disabled for performance
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.neeshai.backend=INFO


# Resend Email Configuration
# Get API key from https://resend.com/api-keys
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL:Neesh AI <onboarding@resend.dev>}

# AI Service Configuration
ai.service.url=${AI_SERVICE_URL:http://localhost:3000}
ai.service.internal-api-key=${AI_SERVICE_INTERNAL_API_KEY:neesh-internal-api-key-2024}

# API Key Encryption
api.key.encryption.secret=${API_KEY_ENCRYPTION_SECRET}

# Supabase Admin (for password reset)
supabase.url=${SUPABASE_URL:https://svtpjdaxikucgpflbeln.supabase.co}
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY:}

# Supabase Storage
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:documents}

# Admin Configuration
admin.master.username=${ADMIN_MASTER_USERNAME:Admin@neeshi.ai}
admin.master.password=${ADMIN_MASTER_PASSWORD}

# Cashfree Configuration
cashfree.app.id=${CASHFREE_APP_ID}
cashfree.secret.key=${CASHFREE_SECRET_KEY}
cashfree.api.url=${CASHFREE_API_URL:https://sandbox.cashfree.com/pg}

# Frontend Configuration
app.frontend.url=${APP_FRONTEND_URL:http://localhost:8080}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Debug Configuration
app.debug=${APP_DEBUG:false}

# OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.show-actuator=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.info.env.enabled=true

# Application Info for Actuator
info.app.name=Neesh AI Backend
info.app.description=RAG-powered AI chatbot backend
info.app.version=1.0.0
info.app.encoding=UTF-8
info.app.java.version=${java.version}
